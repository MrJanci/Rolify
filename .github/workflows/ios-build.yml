name: ios-build

on:
  push:
    tags: ["v*", "ios-v*"]
  workflow_dispatch:

# Baut ein UNSIGNED .ipa auf macOS-Runner. Signing passiert clientseitig via SideStore.
# Xcode-Projekt wird aus apps/ios/project.yml via XcodeGen on-the-fly generiert —
# .xcodeproj ist deshalb nicht im Git (sparsamer und keine Merge-Konflikte).

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write    # fuer softprops/action-gh-release (Release-Asset upload)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Show project structure
        working-directory: apps/ios
        run: |
          ls -la
          xcodebuild -project Rolify.xcodeproj -list

      - name: Archive (unsigned)
        id: archive
        working-directory: apps/ios
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Rolify.xcodeproj \
            -scheme Rolify \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/Rolify.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee /tmp/xcodebuild.log
        shell: bash

      - name: Show Swift errors on failure
        if: failure() && steps.archive.outcome == 'failure'
        run: |
          echo "## Swift Compile-Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -nE "(error:|warning:|undefined|Cannot find|Use of unresolved|Expected|has no member|Type .+ does not conform)" /tmp/xcodebuild.log | head -80 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Last 200 lines of build log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 200 /tmp/xcodebuild.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log
          retention-days: 7

      - name: Export unsigned .ipa
        working-directory: apps/ios
        run: |
          set -euo pipefail
          mkdir -p build/ipa/Payload
          cp -R build/Rolify.xcarchive/Products/Applications/Rolify.app build/ipa/Payload/
          cd build/ipa
          zip -qr Rolify-unsigned.ipa Payload
          ls -la Rolify-unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rolify-unsigned-ipa
          path: apps/ios/build/ipa/Rolify-unsigned.ipa
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/ios/build/ipa/Rolify-unsigned.ipa
