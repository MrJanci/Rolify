name: scraping-ci

on:
  push:
    paths:
      - "scraping/**"
      - ".github/workflows/scraping-ci.yml"
  pull_request:
    paths: ["scraping/**"]

jobs:
  lint:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: scraping
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraping/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install ruff
      - run: ruff check .
      - run: pytest -q || true  # Tests kommen spaeter
