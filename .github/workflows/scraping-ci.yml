name: scraping-ci

on:
  push:
    paths:
      - "scraping/**"
      - ".github/workflows/scraping-ci.yml"
  pull_request:
    paths: ["scraping/**"]

jobs:
  import-check:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: scraping
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scraping/requirements.txt
      - run: pip install -r requirements.txt
      - name: Python import-check (verify no syntax errors)
        run: |
          python -c "from ui_scraper import orchestrator"
          python -c "from ui_scraper.agents import screenshots, colors, typography, icons, flows"
          python -c "from music_acquirer import pipeline, spotify_meta, youtube_match, downloader, transcoder, encryptor, loader"
      - name: Ruff check (non-blocking)
        run: |
          pip install ruff
          ruff check . || echo "::warning::ruff found style issues (non-blocking)"
