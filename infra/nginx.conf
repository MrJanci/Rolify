worker_processes auto;
events { worker_connections 2048; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 16M;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain application/xml image/svg+xml;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Rate-Limit: 20 req/s pro IP, burst 50
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # --- HTTP -> HTTPS Redirect ---
    server {
        listen 80;
        server_name api.rolify.ch cdn.rolify.ch;
        return 301 https://$server_name$request_uri;
    }

    # --- API ---
    server {
        listen 443 ssl http2;
        server_name api.rolify.ch;

        ssl_certificate /etc/nginx/certs/api.rolify.ch.crt;
        ssl_certificate_key /etc/nginx/certs/api.rolify.ch.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # WebSocket fuer Jam
        location /jam/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- CDN (MinIO public buckets: covers, avatars) ---
    server {
        listen 443 ssl http2;
        server_name cdn.rolify.ch;

        ssl_certificate /etc/nginx/certs/cdn.rolify.ch.crt;
        ssl_certificate_key /etc/nginx/certs/cdn.rolify.ch.key;

        # Lange Cache-Zeiten fuer unveraenderliche Assets
        location ~* ^/(covers|avatars)/ {
            proxy_pass http://minio:9000;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / { return 404; }
    }
}
