services:
  postgres:
    image: postgres:16-alpine
    container_name: rolify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rolify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rolify"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rolify-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rolify-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Bucket-Init laeuft einmalig und erstellt die Buckets
  minio-init:
    image: minio/mc:latest
    container_name: rolify-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set rolify http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      mc mb -p rolify/${MINIO_BUCKET_TRACKS} || true;
      mc mb -p rolify/${MINIO_BUCKET_COVERS} || true;
      mc mb -p rolify/${MINIO_BUCKET_AVATARS} || true;
      mc anonymous set download rolify/${MINIO_BUCKET_COVERS};
      mc anonymous set download rolify/${MINIO_BUCKET_AVATARS};
      echo 'Buckets created';
      "

  scraper:
    build:
      context: ../scraping
      dockerfile: Dockerfile
    container_name: rolify-scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET_TRACKS: ${MINIO_BUCKET_TRACKS}
      MINIO_BUCKET_COVERS: ${MINIO_BUCKET_COVERS}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    volumes:
      # .spotify-token.json wird vom Host-FS gemounted (OAuth-Refresh-Token)
      # RW damit spotipy den access_token refreshen kann (expires after 60 min)
      - ../scraping/.spotify-token.json:/app/.spotify-token.json

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: rolify-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET_TRACKS: ${MINIO_BUCKET_TRACKS}
      MINIO_BUCKET_COVERS: ${MINIO_BUCKET_COVERS}
      MINIO_BUCKET_AVATARS: ${MINIO_BUCKET_AVATARS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"

  nginx:
    image: nginx:alpine
    container_name: rolify-nginx
    restart: unless-stopped
    depends_on: [backend, minio]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    profiles: [production]

  # SideStore Anisette-Server
  # Ermoeglicht autonome Cert-Refresh auf dem iPhone (ohne PC + ohne StosVPN).
  # SideStore ruft diesen Server fuer Apple-ID-2FA-Token ab; iPhone braucht nur
  # WireGuard-Zugriff zu 10.8.0.1:6969 (oder direkt ueber Public-DNS wenn Caddy-
  # Proxy konfiguriert ist).
  anisette:
    image: dadoum/anisette-v3-server:latest
    container_name: rolify-anisette
    restart: unless-stopped
    ports:
      - "6969:6969"
    volumes:
      - anisette-data:/home/Alcoholic/.config/anisette-v3

volumes:
  pg-data:
  redis-data:
  minio-data:
  anisette-data:
