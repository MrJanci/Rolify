services:
  postgres:
    image: postgres:16-alpine
    container_name: rolify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rolify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    # Pi-tuned Postgres: shared_buffers ~25% des Container-RAM, max_connections genug
    # fuer Backend-Pool (Prisma default = cpus*2+1 = 9) + Scraper (10) + room.
    command: >
      postgres
      -c max_connections=80
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c wal_buffers=4MB
      -c synchronous_commit=off
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rolify"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-0.75}"
          memory: ${POSTGRES_MEM_LIMIT:-512M}

  redis:
    image: redis:7-alpine
    container_name: rolify-redis
    restart: unless-stopped
    # --maxmemory + LRU damit Redis selbst evictet anstatt OOM-killed zu werden
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
      --maxmemory 200mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: ${REDIS_MEM_LIMIT:-256M}

  minio:
    image: minio/minio:latest
    container_name: rolify-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${MINIO_CPU_LIMIT:-0.75}"
          memory: ${MINIO_MEM_LIMIT:-512M}

  # Bucket-Init laeuft einmalig und erstellt die Buckets
  minio-init:
    image: minio/mc:latest
    container_name: rolify-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set rolify http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      mc mb -p rolify/${MINIO_BUCKET_TRACKS} || true;
      mc mb -p rolify/${MINIO_BUCKET_COVERS} || true;
      mc mb -p rolify/${MINIO_BUCKET_AVATARS} || true;
      mc anonymous set download rolify/${MINIO_BUCKET_COVERS};
      mc anonymous set download rolify/${MINIO_BUCKET_AVATARS};
      echo 'Buckets created';
      "

  scraper:
    build:
      context: ../scraping
      dockerfile: Dockerfile
    container_name: rolify-scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET_TRACKS: ${MINIO_BUCKET_TRACKS}
      MINIO_BUCKET_COVERS: ${MINIO_BUCKET_COVERS}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      # Parallel-Downloads pro Job — hoeher = schneller, aber mehr Last
      # auf YT-Rate-Limits + Pi-CPU.
      # Pi 4 (4 GB RAM): 4 download / 2 transcode = sweet spot
      # Pi 5 (8 GB RAM): 6-8 download / 3-4 transcode geht auch
      # Auf staerkerer x86-Hardware ruhig auf 12/4 hochziehen.
      CONCURRENCY_DOWNLOAD: ${CONCURRENCY_DOWNLOAD:-4}
      CONCURRENCY_TRANSCODE: ${CONCURRENCY_TRANSCODE:-2}
      # Last.fm-API-Key fuer dynamic playlists (refresh_dynamic_playlists.py)
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
    volumes:
      # .spotify-token.json wird vom Host-FS gemounted (OAuth-Refresh-Token)
      # RW damit spotipy den access_token refreshen kann (expires after 60 min)
      - ../scraping/.spotify-token.json:/app/.spotify-token.json
      # YouTube cookies.txt fuer age-gated Videos.
      # RW damit yt-dlp den cookies-file refreshen kann (sonst OSError: Read-only FS).
      # Session-cookies werden sowieso ueber die Zeit updated; kein security-issue.
      - ../scraping/.youtube-cookies.txt:/app/.youtube-cookies.txt
    # Resource-Limits damit der Scraper den Pi nicht in die Knie zwingt.
    # ffmpeg-Transcoding ist CPU-hungry, deshalb cpus < total cores.
    # Wer auf x86-Server laeuft kann diese Limits hochsetzen oder entfernen.
    deploy:
      resources:
        limits:
          cpus: "${SCRAPER_CPU_LIMIT:-1.5}"
          memory: ${SCRAPER_MEM_LIMIT:-1500M}

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: rolify-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET_TRACKS: ${MINIO_BUCKET_TRACKS}
      MINIO_BUCKET_COVERS: ${MINIO_BUCKET_COVERS}
      MINIO_BUCKET_AVATARS: ${MINIO_BUCKET_AVATARS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    # Backend reservierte Ressourcen, damit er reaktiv bleibt waehrend Scraper rumackert.
    # 768M weil v0.18 /browse/home jetzt 7 parallele Prisma-Queries macht
    # (Node + Prisma-Engine sind hungry).
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPU_LIMIT:-1.0}"
          memory: ${BACKEND_MEM_LIMIT:-768M}
        reservations:
          cpus: "0.25"
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: rolify-nginx
    restart: unless-stopped
    depends_on: [backend, minio]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    profiles: [production]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # SideStore Anisette-Server
  # Ermoeglicht autonome Cert-Refresh auf dem iPhone (ohne PC + ohne StosVPN).
  # SideStore ruft diesen Server fuer Apple-ID-2FA-Token ab; iPhone braucht nur
  # WireGuard-Zugriff zu 10.8.0.1:6969 (oder direkt ueber Public-DNS wenn Caddy-
  # Proxy konfiguriert ist).
  anisette:
    image: dadoum/anisette-v3-server:latest
    container_name: rolify-anisette
    restart: unless-stopped
    ports:
      - "6969:6969"
    volumes:
      - anisette-data:/home/Alcoholic/.config/anisette-v3
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

volumes:
  pg-data:
  redis-data:
  minio-data:
  anisette-data:
