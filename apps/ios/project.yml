# XcodeGen Config — generiert Rolify.xcodeproj auf dem macOS-Runner
# Docs: https://github.com/yonaskolb/XcodeGen

name: Rolify
options:
  bundleIdPrefix: ch.rolify
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Release
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    ENABLE_BITCODE: "NO"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Rolify:
    type: application
    platform: iOS
    sources:
      - path: Rolify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.rolify.app
        INFOPLIST_FILE: Rolify/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only (kein iPad fuer jetzt)
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
